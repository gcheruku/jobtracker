name: Build & Deploy

# Images are built on GitHub-hosted runners (plenty of RAM) and pushed to GHCR;
# the self-hosted NAS runner then only *pulls* and restarts — a light, memory-safe
# step that can't OOM a 2 GB NAS the way an on-device build could.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: jobtracker-deploy
  cancel-in-progress: false

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/jobtracker

jobs:
  build:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-backend:latest
          build-args: |
            WITH_SEMANTIC=${{ vars.WITH_SEMANTIC || 'false' }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to Synology (pull only)
    needs: build
    runs-on: [self-hosted]
    permissions:
      contents: read
      packages: read
    env:
      # NAS folder holding all personal data (mounted at /data). Override with a
      # repo Variable DATA_DIR if your path differs.
      DATA_DIR: ${{ vars.DATA_DIR || '/volume1/docker/jobtracker/data' }}
      WEB_PORT: ${{ vars.WEB_PORT || '8080' }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull new images and (re)start
        run: |
          docker compose -f deploy/docker-compose.yml pull
          docker compose -f deploy/docker-compose.yml up -d --remove-orphans

      - name: Prune old images
        run: docker image prune -f
