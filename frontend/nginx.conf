server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Compress text assets on the fly; also serve any precompressed *.gz
    # produced at build time instead of re-compressing per request.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_static on;

    # API calls go to the backend container on the compose network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Compare-with-Resume / ingestion can take a while.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Hashed build assets are content-addressed and immutable, so cache them
    # hard — repeat visits and in-app navigations won't re-download JS/CSS.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA — serve index.html for any non-asset path. Never cache it, so a new
    # deploy (with new hashed asset names) is picked up on the next load.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
